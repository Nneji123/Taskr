services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mercadotnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-mercadotnet}
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mercadotnet}"]
      interval: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 10s }
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports: ["8025:8025", "1025:1025"]
    healthcheck: { test: ["CMD", "wget", "-qO-", "http://localhost:8025/"], interval: 15s }
    restart: unless-stopped
    tmpfs: /data

  api:
    build: { context: ., dockerfile: Dockerfile }
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      DATABASE__CONNECTIONSTRING: Host=postgres;Port=5432;Database=${POSTGRES_DB:-mercadotnet};Username=${POSTGRES_USER:-mercadotnet};Password=${POSTGRES_PASSWORD:-changeme}
      REDIS__CONNECTIONSTRING: redis:6379
      JWT__SECRET: ${JWT__SECRET}
      JWT__ISSUER: ${JWT_ISSUER:-mercadotnet}
      JWT__AUDIENCE: ${JWT_AUDIENCE:-mercadotnet-clients}
      JWT__ACCESSTOKENLIFETIMEMINUTES: 15
      JWT__REFRESHTOKENLIFETIMEDAYS: 7
      SENTRY__DSN: ${SENTRY__DSN:-}
      EMAIL__SMTP__HOST: mailpit
      EMAIL__SMTP__PORT: 1025
      EMAIL__SMTP__USETLS: "false"
      EMAIL__SMTP__FROM: noreply@mercadotnet.local
      EMAIL__SMTP__FROMNAME: Mercadotnet
    ports: ["8080:8080"]
    volumes: [dpapi-keys:/home/app/.aspnet/DataProtection-Keys]
    restart: unless-stopped

volumes:
  pgdata:
  dpapi-keys:
